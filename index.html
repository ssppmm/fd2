<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炎龍騎士團 2</title>
  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --border: #2a2a3e;
      --accent: #ff6b00; --text: #e8e8f0; --muted: #6b6b8a;
      --font-pixel: 'Press Start 2P', monospace;
      --font-body: 'Noto Sans KR', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }
    header {
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .logo { font-family: var(--font-pixel); font-size: 11px; color: var(--accent); }
    .header-meta { font-size: 10px; color: var(--muted); text-align: right; line-height: 1.8; }
    .header-meta a { color: var(--accent); text-decoration: none; }
    main { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
    .game-info {
      display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
      padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    }
    .game-badge { font-family: var(--font-pixel); font-size: 8px; padding: 5px 8px; background: var(--accent); color: #000; border-radius: 2px; }
    .game-title-block h1 { font-family: var(--font-pixel); font-size: 11px; margin-bottom: 4px; }
    .game-title-block p { font-size: 11px; color: var(--muted); }
    .game-actions { margin-left: auto; display: flex; gap: 8px; }
    .btn { font-family: var(--font-pixel); font-size: 8px; padding: 8px 12px; border: 1px solid; border-radius: 2px; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; }
    .btn-primary:hover { background: transparent; color: var(--accent); }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .player-wrapper { position: relative; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    #canvas { width: 100%; aspect-ratio: 4/3; max-height: 60vh; display: block; }
    #splash {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #000; cursor: pointer; z-index: 10; transition: opacity .4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-icon { font-size: 64px; margin-bottom: 20px; }
    .splash-title { font-family: var(--font-pixel); font-size: 13px; color: var(--accent); margin-bottom: 10px; text-align: center; line-height: 1.8; }
    .splash-sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
    .play-btn {
      font-family: var(--font-pixel); font-size: 10px; padding: 12px 28px;
      background: transparent; border: 2px solid var(--accent); color: var(--accent);
      cursor: pointer; letter-spacing: 2px; animation: pulse 2s infinite; transition: all .2s;
    }
    .play-btn:hover { background: var(--accent); color: #000; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #loading { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 11; }
    #loading.show { display: flex; }
    .loading-text { font-family: var(--font-pixel); font-size: 10px; color: var(--accent); margin-bottom: 20px; animation: pulse 1s infinite; }
    .progress-bar-outer { width: 260px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-bar-inner { height: 100%; background: var(--accent); width: 0%; transition: width .3s; }

    /* 모바일 터치 컨트롤 */
    .touch-controls {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    @media (pointer: coarse) {
      .touch-controls { display: flex; justify-content: space-between; align-items: center; }
      .pc-controls { display: none; }
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 4px;
    }
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .touch-btn {
      width: 56px; height: 56px;
      background: #1e1e2e;
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: all .1s;
      touch-action: manipulation;
    }
    .touch-btn:active, .touch-btn.pressed {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      transform: scale(0.92);
    }
    .touch-btn.action {
      width: 72px; height: 56px;
      font-family: var(--font-pixel);
      font-size: 9px;
      background: #1a1a2e;
      border-color: var(--accent);
      color: var(--accent);
    }
    .touch-btn.empty { background: transparent; border: none; pointer-events: none; }
    .dpad-up    { grid-column: 2; grid-row: 1; }
    .dpad-left  { grid-column: 1; grid-row: 2; }
    .dpad-center{ grid-column: 2; grid-row: 2; background: transparent; border: none; pointer-events: none; }
    .dpad-right { grid-column: 3; grid-row: 2; }
    .dpad-down  { grid-column: 2; grid-row: 3; }

    /* PC 컨트롤 안내 */
    .pc-controls { margin-top: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .control-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
    .control-card h3 { font-family: var(--font-pixel); font-size: 9px; color: var(--accent); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .key-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .key { font-family: var(--font-pixel); font-size: 8px; padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 2px; color: var(--text); min-width: 40px; text-align: center; }
    .key-desc { color: var(--muted); font-size: 11px; }
    footer { margin-top: 32px; padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">🐉 FLAME DRAGON 2</div>
</header>

<main>
  <div class="game-info">
    <div class="game-badge">DOS</div>
    <div class="game-title-block">
      <h1>용의기사 2</h1>
      <p>Flame Dragon 2 · 1995 · 턴제 전략 RPG</p>
    </div>
    <div class="game-actions">
      <button class="btn btn-ghost" id="btn-fullscreen">⛶ 전체화면</button>
      <button class="btn btn-primary" id="btn-start">▶ 시작하기</button>
    </div>
  </div>

  <div class="player-wrapper">
    <div id="splash">
      <div class="splash-icon">🐉</div>
      <div class="splash-title">FLAME DRAGON 2</div>
      <div class="splash-sub">클릭하여 시작</div>
      <button class="play-btn" id="btn-play">▶ PLAY</button>
    </div>
    <div id="loading">
      <div class="loading-text">LOADING...</div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <!-- 모바일 터치 컨트롤 (터치 기기에서만 표시) -->
  <div class="touch-controls">
    <div class="dpad">
      <button class="touch-btn dpad-up"    data-key="ArrowUp">↑</button>
      <button class="touch-btn dpad-left"  data-key="ArrowLeft">←</button>
      <div class="touch-btn dpad-center"></div>
      <button class="touch-btn dpad-right" data-key="ArrowRight">→</button>
      <button class="touch-btn dpad-down"  data-key="ArrowDown">↓</button>
    </div>
    <div class="action-btns">
      <button class="touch-btn action" data-key="Enter">Enter</button>
      <button class="touch-btn action" data-key="Escape">Esc</button>
    </div>
  </div>

  <!-- PC 컨트롤 안내 -->
  <div class="pc-controls">
    <div class="control-card">
      <h3>⌨ 기본 조작키</h3>
      <div class="key-row"><span class="key">↑↓←→</span><span class="key-desc">이동 / 커서</span></div>
      <div class="key-row"><span class="key">Enter</span><span class="key-desc">확인 / 선택</span></div>
      <div class="key-row"><span class="key">Esc</span><span class="key-desc">취소 / 메뉴</span></div>
      <div class="key-row"><span class="key">Space</span><span class="key-desc">실행</span></div>
    </div>
    <div class="control-card">
      <h3>🖥 DOSBox 단축키</h3>
      <div class="key-row"><span class="key">Ctrl+F10</span><span class="key-desc">마우스 해제</span></div>
      <div class="key-row"><span class="key">Alt+Enter</span><span class="key-desc">전체화면</span></div>
      <div class="key-row"><span class="key">Ctrl+F5</span><span class="key-desc">스크린샷</span></div>
      <div class="key-row"><span class="key">Ctrl+F9</span><span class="key-desc">종료</span></div>
    </div>
  </div>
</main>

<footer>
  <div>Built with <a href="https://js-dos.com" target="_blank">js-dos 6.22</a> · DOSBox WebAssembly</div>
  <div><a href="https://github.com/ssppmm/fd2" target="_blank">GitHub</a></div>
</footer>

<script>
  var gameStarted = false;

  var gameFiles = [
    "FD2.EXE", "FD2.DPP", "FD2.SAV", "FD2.TMP",
    "ANI.DAT", "BG.DAT", "DATO.DAT", "FDFIELD.DAT",
    "FDICON.B24", "FDMUS.DAT", "FDOTHER.DAT", "FDSHAP.DAT",
    "FDTXT.DAT", "FIGANI.DAT", "TITLE.DAT", "TAI.DAT",
    "DIG.INI", "MDI.INI", "AILDRVR.LST", "DPP.COM",
    "ADLIB.MDI", "ADLIBG.MDI", "NULL.MDI", "TANDY.MDI",
    "PCSPKR.MDI", "MPU401.MDI", "MT32MPU.MDI",
    "OPL3.MDI", "PAS.MDI", "PASPLUS.MDI",
    "SBLASTER.MDI", "SBPRO1.MDI", "SBPRO2.MDI",
    "SBAWE32.MDI", "SNDSCAPE.MDI", "ULTRA.MDI",
    "RAP10.DIG", "PROAUDIO.DIG", "ADRV688.DIG",
    "JAMMER.DIG", "SBLASTER.DIG", "SBPRO.DIG",
    "SNDSCAPE.DIG", "ULTRA.DIG", "SB16.DIG",
    "SAMPLE.AD", "SAMPLE.BNK", "SAMPLE.OPL"
  ];

  function startGame() {
    if (gameStarted) return;
    gameStarted = true;

    document.getElementById('splash').classList.add('hidden');
    document.getElementById('loading').classList.add('show');

    var bar = document.getElementById('progress-bar');
    var loaded = 0;

    Dos(document.getElementById('canvas'), {
      wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js"
    }).ready(function(fs, main) {
      var promises = gameFiles.map(function(filename) {
        return fetch("./" + filename)
          .then(function(r) { return r.arrayBuffer(); })
          .then(function(buf) {
            fs.createFile(filename, new Uint8Array(buf));
            loaded++;
            bar.style.width = Math.round((loaded / gameFiles.length) * 100) + '%';
          });
      });

      Promise.all(promises).then(function() {
        bar.style.width = '100%';
        document.getElementById('loading').classList.remove('show');
        main(["-c", "FD2.EXE"]);
      }).catch(function(e) {
        console.error("파일 로드 실패:", e);
      });
    });
  }

  function toggleFullscreen() {
    var wrapper = document.querySelector('.player-wrapper');
    if (!document.fullscreenElement) {
      if (wrapper.requestFullscreen) wrapper.requestFullscreen();
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
    }
  }

  // 터치 버튼 키 이벤트 전송
  function sendKey(key, type) {
    var canvas = document.getElementById('canvas');
    var event = new KeyboardEvent(type, {
      key: key, code: key, keyCode: getKeyCode(key),
      bubbles: true, cancelable: true
    });
    canvas.dispatchEvent(event);
    document.dispatchEvent(event);
  }

  function getKeyCode(key) {
    var codes = {
      'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
      'Enter': 13, 'Escape': 27
    };
    return codes[key] || 0;
  }

  // 터치 버튼 이벤트 등록
  document.querySelectorAll('.touch-btn[data-key]').forEach(function(btn) {
    var key = btn.getAttribute('data-key');

    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      btn.classList.add('pressed');
      sendKey(key, 'keydown');
    }, { passive: false });

    btn.addEventListener('touchend', function(e) {
      e.preventDefault();
      btn.classList.remove('pressed');
      sendKey(key, 'keyup');
    }, { passive: false });

    btn.addEventListener('mousedown', function() {
      btn.classList.add('pressed');
      sendKey(key, 'keydown');
    });

    btn.addEventListener('mouseup', function() {
      btn.classList.remove('pressed');
      sendKey(key, 'keyup');
    });
  });

  document.getElementById('btn-start').addEventListener('click', startGame);
  document.getElementById('btn-play').addEventListener('click', startGame);
  document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && !gameStarted) {
      e.preventDefault();
      startGame();
    }
  });
</script>
</body>
</html>
